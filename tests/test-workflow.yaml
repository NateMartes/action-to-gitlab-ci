name: "Terraform Apply Database"

on:
  workflow_call:
    outputs:
      vpc_id:
        description: "The ID of the AWS VPC the database was deployed to"
        value: ${{ jobs.init-db.outputs.vpc_id }}
      route53_zone_id:
        description: "The ID of the DNS hosted zone that the database uses"
        value: ${{ jobs.init-db.outputs.route53_zone_id }}
      route53_node_zone_id:
        description: "The ID of the DNS hosted zone that database nodes uses"
        value: ${{ jobs.init-db.outputs.route53_node_zone_id }}
      vpc_cidr:
        description: "The CIDR block the database uses"
        value: ${{ jobs.init-db.outputs.vpc_cidr }}
      route_table_id:
        description: "The ID of the route table that belongs to the database nodes"
        value: ${{ jobs.init-db.outputs.route_table_id }}

jobs:
  terraform-apply:    
    name: "Terraform Apply Database"
    runs-on: ubuntu-latest
    environment: production
    
    env:
      TF_CLOUD_ORGANIZATION: "epa-terraform"
      TF_API_TOKEN: "${{ secrets.EPA_TF_API_TOKEN }}"
      TF_WORKSPACE: "terraform-github-actions-database"
      CONFIG_DIRECTORY: "./database/terraform"
      
    permissions: # granular permissions
      # so GitHub can check out this repo using the default github.token
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.0.0
        id: apply-upload
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create Apply Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        id: apply-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.apply-upload.outputs.configuration_version_id }}

      - name: Apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.0.0
        if: fromJSON(steps.apply-run.outputs.payload).data.attributes.actions.IsConfirmable
        id: apply
        with:
          run: ${{ steps.apply-run.outputs.run_id }}
          comment: "Apply Run from GitHub Actions CI ${{ github.sha }}"
  init-db:
    needs: terraform-apply
    name: "Init the Database"
    runs-on: ubuntu-latest
    environment: production
    outputs:
      vpc_id: ${{ steps.setup-replica-set.outputs.vpc_id }}
      route53_zone_id: ${{ steps.setup-replica-set.outputs.route53_zone_id }}
      route53_node_zone_id: ${{ steps.setup-replica-set.outputs.route53_node_zone_id }}
      vpc_cidr: ${{ steps.setup-replica-set.outputs.vpc_cidr }}
      route_table_id: ${{ steps.setup-replica-set.outputs.route_table_id }}
    env:
      TF_CLOUD_ORGANIZATION: "epa-terraform"
      TF_API_TOKEN: "${{ secrets.EPA_TF_API_TOKEN }}"
      TF_WORKSPACE: "terraform-github-actions-database"
      CONFIG_DIRECTORY: "./database/terraform"
      AWS_DEFAULT_REGION: "${{ vars.AWS_REGION }}"
    
    permissions: # granular permissions
      # so GitHub can check out this repo using the default github.token
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup Terraform CLI
      uses: hashicorp/setup-terraform@v3
      with:
        cli_config_credentials_token: ${{ secrets.EPA_TF_API_TOKEN }}
        
    - name: Install AWS CLI
      run: |
        sudo apt update && sudo apt install -y unzip curl
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip awscliv2.zip
        sudo ./aws/install --update
        rm -rf awscliv2.zip aws
        
    - name: Configure AWS CLI Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_RUNNER_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_RUNNER_SECRET_KEY }}
        aws-region: ${{ env.AWS_DEFAULT_REGION }}
        
    - name: Init terraform CLI
      working-directory: ${{ env.CONFIG_DIRECTORY }}
      run: terraform init
          
    - name: Setup Replica Set on MongoDB Cluster
      working-directory: ${{ env.CONFIG_DIRECTORY }}
      id: setup-replica-set
      run: |
        
        # Store output
        echo "vpc_id=$(terraform output -raw vpc_id)" >> $GITHUB_OUTPUT
        echo "route53_zone_id=$(terraform output -raw mongo_dns_id)" >> $GITHUB_OUTPUT
        echo "route53_node_zone_id=$(terraform output -raw mongo_node_dns_id)" >> $GITHUB_OUTPUT
        echo "vpc_cidr=$(terraform output -raw vpc_cidr_block)" >> $GITHUB_OUTPUT
        echo "route_table_id=$(terraform output -raw route_table_id)" >> $GITHUB_OUTPUT

        sudo apt install -y jq
        
        # For ECS Exec
        sudo apt install -y expect
        replica_set_name=$(terraform output -raw replica_set_name)
        dns_namespace=$(terraform output -raw mongo_db_cluster_dns_namespace_name)
        
        raw_json_members=$(
          terraform output -json mongo_db_cluster_dns_discovery_service | 
          jq -c --arg suffix "$dns_namespace" 'to_entries | map({
            _id: .key, 
            host: (.value.name + "." + $suffix + ":27017")
          })'
        )
        
        # Swap double quotes for single quotes so the shell doesn't strip them
        replica_set_members=$(echo "$raw_json_members" | tr '"' "'")
        
        echo "Generated members are: $replica_set_members"
        
        # Script to setup replica set in mongosh
        MONGO_INIT_SCRIPT=$(cat << EOF
        
        // Try to authenticate with admin login
        let adminDb = db.getSiblingDB('admin');
        try {
          // Use a variable to check if auth works
          let isAuthed = adminDb.auth('${{ secrets.EPA_MONGODB_USERNAME }}', '${{ secrets.EPA_MONGODB_PASSWORD }}');
          if (isAuthed) {
            print('SUCCESS_TOKEN: Already authenticated as admin, skipping setup.');
            quit();
          }
        } catch (e) {
          print('Not authenticated yet, proceeding with setup...');
        }
        
        let members = $replica_set_members;
        
        // Bootstrap with the first member
        try {
          rs.initiate({
            _id: '$replica_set_name', 
            members: [{ _id: 0, host: members[0].host }]
          });
          print('Created initial replica set');
        } catch(e) {
          if (e.message.indexOf('already') === -1 && e.message.indexOf('auth') === -1) {
            print('FATAL ERROR during initiate: ' + e.message); 
            quit(1);
          }
        }
        
        print('Waiting to become PRIMARY...');
        let attempts = 0;
        while (db.hello().isWritablePrimary === false) {
          if (attempts > 30) { 
            print('FATAL ERROR: Timeout waiting for PRIMARY election.'); 
            quit(1); 
          }
          sleep(2000);
          attempts++;
        }
        
        // Create the admin user
        try {
          adminDb.createUser({
            user: '${{ secrets.EPA_MONGODB_USERNAME }}',
            pwd: '${{ secrets.EPA_MONGODB_PASSWORD }}',
            roles: [ { role: 'root', db: 'admin' } ]
          });
          print('Admin user created.');
        } catch (e) {
          if (e.codeName !== 'DuplicateKey' && e.message.indexOf('already exists') === -1) {
            print('FATAL ERROR: Failed to create user: ' + e.message); 
            quit(1);
          }
        }
        
        // Authenticate to add remaining nodes
        try {
          adminDb.auth('${{ secrets.EPA_MONGODB_USERNAME }}', '${{ secrets.EPA_MONGODB_PASSWORD }}');
          print('Successfully authenticated as admin.');
        } catch (e) {
          print('FATAL ERROR authenticating: ' + e.message); 
          quit(1);
        }
        
        // Add the sibling nodes
        for (let i = 1; i < members.length; i++) {
          try {
            rs.add(members[i].host);
            print('Invited sibling ' + members[i].host + ' to the cluster.');
          } catch(addErr) {
            // Already in cluster or other non-fatal error
          }
        }
        
        print(\`SUCCESS_TOKEN: MongoDB Replica Set $replica_set_name created with \${members.length} nodes\`);
        EOF
        )
        
        B64_SCRIPT=$(echo "$MONGO_INIT_SCRIPT" | base64 -w 0)
        cluster_name=$(terraform output -raw mongo_db_cluster_name)
        service_name=$(terraform output -raw first_mongodb_service)
        
        success=0
        for i in $(seq 1 10); do
          echo "Trying to connect to MongoDB cluster instances (Attempt $i/10)..."
          
          # Get Task ARN for one of the nodes in the cluster
          task_arn=$(aws ecs list-tasks \
            --cluster "$cluster_name" \
            --service-name "$service_name" \
            --desired-status RUNNING \
            --query 'taskArns[0]' --output text)
            
          echo "Target Task ARN: $task_arn"
        
          if [ "$task_arn" == "None" ] || [ -z "$task_arn" ]; then
            echo "No RUNNING task found yet. Retrying in 10 seconds..."
            sleep 10
            continue
          fi
        
          echo "Running Init Replica Set Script..."
          EXEC_OUTPUT=$(unbuffer aws ecs execute-command \
              --cluster "$cluster_name" \
              --task "$task_arn" \
              --container "mongo" \
              --interactive \
              --command "sh -c '
                  echo $B64_SCRIPT | base64 -d > /tmp/init.js
                  mongosh --quiet /tmp/init.js
                '" 2>&1) || true
          
          echo "$EXEC_OUTPUT"
        
          # Validate the actual container output
          if echo "$EXEC_OUTPUT" | grep -q "SUCCESS_TOKEN"; then
            echo "Replica set established successfully"
            success=1
            break
          elif echo "$EXEC_OUTPUT"; then
            echo "Connection failed or SSM tunnel not ready. Retrying in 10 seconds..."
            sleep 10
          fi
        done
        
        if [ $success -ne 1 ]; then
          echo "Failed to reach cluster in 10 tries with ECS command, exiting"
          exit 1
        fi
      
    - name: Init Database and Collections on Mongo Cluster
      working-directory: ${{ env.CONFIG_DIRECTORY }}   
      run: |
          
          # For ECS Exec
          sudo apt install -y expect
          
          # Get hostname from terraform
          export EPA_MONGODB_HOSTNAME=$(terraform output -raw mongo_db_cluster_dns_name)

          # Get variables for ecs command
          cluster_name=$(terraform output -raw mongo_db_cluster_name)
          service_name=$(terraform output -raw first_mongodb_service)
          
          # Move to ./database
          cd ../
          
          # Get script files (encode in Base64 for special characters)
          REQ_B64=$(base64 -w 0 ./requirements.txt)
          SCRIPT_B64=$(base64 -w 0 ./init.py)
          CONFIG_B64=$(base64 -w 0 ./config.json)
          
          success=0
          for i in $(seq 1 10); do
            echo "Trying to connect to MongoDB cluster instances (Attempt $i/10)..."
            
            # Get Task ARN for one of the nodes in the cluster
            task_arn=$(aws ecs list-tasks \
              --cluster "$cluster_name" \
              --service-name "$service_name" \
              --desired-status RUNNING \
              --query 'taskArns[0]' --output text)
              
            echo "Target Task ARN: $task_arn"
          
            if [ "$task_arn" == "None" ] || [ -z "$task_arn" ]; then
              echo "No RUNNING task found yet. Retrying in 10 seconds..."
              sleep 10
              continue
            fi
          
            echo "Running Init Script..."
            EXEC_OUTPUT=$(unbuffer aws ecs execute-command \
                --cluster "$cluster_name" \
                --task "$task_arn" \
                --container "mongo" \
                --interactive \
                --command "sh -c '
                
                  # Move needed files over
                  echo $REQ_B64 | base64 -d > /tmp/requirements.txt
                  echo $SCRIPT_B64 | base64 -d > /tmp/init.py
                  echo $CONFIG_B64 | base64 -d > /tmp/config.json
                  
                  # Setup env variables
                  export EPA_MONGODB_HOSTNAME=\"$EPA_MONGODB_HOSTNAME\"
                  export EPA_MONGODB_PORT=27017
                  export EPA_MONGODB_USERNAME=\"${{ secrets.EPA_MONGODB_USERNAME }}\"
                  export EPA_MONGODB_PASSWORD=\"${{ secrets.EPA_MONGODB_PASSWORD }}\"
                  export EPA_MONGODB_DATABASE_NAME=\"${{ vars.EPA_MONGODB_DATABASE_NAME }}\"
                  
                  # Install script dependencies
                  apt update && apt install -y python3 python3.10-venv
                  python3 -m venv /tmp/.venv
                  /tmp/.venv/bin/pip install -r /tmp/requirements.txt > /dev/null
                  
                  # Run
                  cd /tmp
                  /tmp/.venv/bin/python3 /tmp/init.py --is-cluster
                  
                  # Finish
                  echo SUCCESS_TOKEN: Database initialized
                  '" 2>&1) || true
            
            echo "$EXEC_OUTPUT"
          
            # Validate the actual container output
            if echo "$EXEC_OUTPUT" | grep -q "SUCCESS_TOKEN"; then
              echo "Database initialize successfully"
              success=1
              break
            elif echo "$EXEC_OUTPUT"; then
              echo "Connection failed or SSM tunnel not ready. Retrying in 10 seconds..."
              sleep 10
            fi
          done
          
          if [ $success -ne 1 ]; then
            echo "Failed to initialize cluster in 10 tries with ECS command, exiting"
            exit 1
          fi
